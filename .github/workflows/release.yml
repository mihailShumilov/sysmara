name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC trusted publisher

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Do NOT use registry-url here — it creates .npmrc with NODE_AUTH_TOKEN
      # which conflicts with OIDC trusted publisher auth
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Manually configure registry without auth token
      # OIDC token is provided automatically via id-token: write permission
      - name: Configure npm registry
        run: |
          npm config set registry https://registry.npmjs.org/

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          NEW_VERSION=$(npm version $BUMP_TYPE --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Update npm (OIDC trusted publisher requires npm >= 9.6.0)
        run: npm install -g npm@latest

      - name: Publish to npm (trusted publisher / OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
